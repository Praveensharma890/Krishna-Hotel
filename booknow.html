<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Krishna Hotel Room booking</title>
    <!-- add css -->
    <link rel="stylesheet" href="booknow.css" />
  </head>
  <body>
    <header class="header">
      <h1 class="header_title">Krishna Hotel Booking</h1>
      <p class="header_desc">
        Book your room easily and enjoy a comfortable stay with excellent
        service and modern facilities.
      </p>
    </header>
    <section class="booking_section" id="booking_section">
      <form class="booking_form" autocomplete="on">
        <h2 class="legend_title">Book Your Room</h2>
        <label for="fullname">Full Name :</label>
        <input
          type="text"
          name="fullname"
          id="fullname"
          placeholder="Enter your fullname"
        />
        <label for="mobile">Mobile no :</label>
        <input
          type="tel"
          name="mobile"
          id="mobile"
          placeholder="Enter mobile number"
        />
        <label for="email">Email :</label>
        <input
          type="email"
          name="email"
          id="email"
          placeholder="Enter your email"
        />
        <label for="checkindate">Check in Date :</label>
        <input type="date" name="cheackin" id="checkindate" />
        <label for="checkoutdate">Check out Date :</label>
        <input type="date" name="checkout" id="checkoutdate" />
        <label for="numberofguest">Guests :</label>
        <input type="number" name="nog" id="numberofguest" min="1" max="10" />
        <label for="roomtype">Select room :</label>
        <select name="room" id="roomtype">
          <option value="Deluxe-Room">Deluxe Room</option>
          <option value="Luxury-Room">Luxury Room</option>
          <option value="Family-Room">Family Room</option>
          <option value="Premium-Suite">Premium Suite</option>
        </select>
        <label for="specialrequest">Special Request :</label>
        <textarea
          name="specialrequest"
          id="specialrequest"
          placeholder="Any special request..."
        ></textarea>
        <button type="submit" class="confirm_btn">Confirm Booking</button>
      </form>
    </section>
    <footer class="footer" id="footer">
      <h2 class="foot_title">Krishna Hotel</h2>
      <p class="foot_copyright">
        &copy; Krishna Hotel 2026. All Rights Reserved
      </p>
      <p class="foot_msg">Designed with &hearts; by Praveen Sharma</p>
    </footer>
  </body>
</html>
